<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" rx="104" fill="#f5e6c8"/>

  <!-- ── STRAW ── -->
  <line x1="292" y1="448" x2="390" y2="88"
        stroke="#1a1005" stroke-width="30" stroke-linecap="round"/>
  <line x1="292" y1="448" x2="390" y2="88"
        stroke="#f7cf6b" stroke-width="20" stroke-linecap="round"/>
  <!-- Straw stripe -->
  <line x1="292" y1="448" x2="390" y2="88"
        stroke="rgba(255,255,255,0.4)" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="28 28" stroke-dashoffset="0"/>

  <!-- ── GLASS FILL (slightly transparent so straw shows) ── -->
  <path d="M 148 172 L 358 172 L 340 422 Q 336 452 246 452 Q 156 452 152 422 Z"
        fill="#d4a96a"/>

  <!-- Coffee at bottom -->
  <path d="M 157 370 L 340 358 L 340 422 Q 336 452 246 452 Q 156 452 152 422 L 157 370 Z"
        fill="#3d1f05"/>

  <!-- ── ICE CUBES ── -->
  <!-- Ice 1 -->
  <rect x="162" y="188" width="88" height="80" rx="14"
        fill="#8ecff0" stroke="#1a1005" stroke-width="8"/>
  <rect x="172" y="198" width="28" height="16" rx="5" fill="rgba(255,255,255,0.55)"/>

  <!-- Ice 2 -->
  <rect x="258" y="194" width="84" height="78" rx="14"
        fill="#8ecff0" stroke="#1a1005" stroke-width="8"/>
  <rect x="268" y="204" width="26" height="15" rx="5" fill="rgba(255,255,255,0.5)"/>

  <!-- Ice 3 (lower) -->
  <rect x="168" y="272" width="78" height="72" rx="13"
        fill="#8ecff0" stroke="#1a1005" stroke-width="8"/>
  <rect x="177" y="281" width="24" height="14" rx="4" fill="rgba(255,255,255,0.5)"/>

  <!-- ── GLASS OUTLINE ── -->
  <path d="M 148 172 L 358 172 L 340 422 Q 336 452 246 452 Q 156 452 152 422 Z"
        fill="none" stroke="#1a1005" stroke-width="13" stroke-linejoin="round"/>
  <!-- Glass top rim -->
  <line x1="148" y1="172" x2="358" y2="172" stroke="#1a1005" stroke-width="13" stroke-linecap="round"/>

  <!-- Glass highlight (left side shine) -->
  <path d="M 162 195 L 158 390" stroke="rgba(255,255,255,0.25)" stroke-width="10" stroke-linecap="round"/>

  <!-- ── LEMON SLICE (on straw top) ── -->
  <!-- Lemon outline circle -->
  <circle cx="388" cy="96" r="46" fill="#f7cf3a" stroke="#1a1005" stroke-width="10"/>
  <!-- Lemon inner segments -->
  <circle cx="388" cy="96" r="28" fill="#fde97a" stroke="#1a1005" stroke-width="6"/>
  <line x1="388" y1="68" x2="388" y2="124" stroke="#1a1005" stroke-width="5"/>
  <line x1="364" y1="82" x2="412" y2="110" stroke="#1a1005" stroke-width="5"/>
  <line x1="364" y1="110" x2="412" y2="82" stroke="#1a1005" stroke-width="5"/>

  <!-- ── COFFEE BEANS ── -->
  <!-- Bean 1 -->
  <ellipse cx="390" cy="368" rx="30" ry="20" fill="#6b3a1f" stroke="#1a1005" stroke-width="7" transform="rotate(-30 390 368)"/>
  <path d="M 373 356 Q 390 372 407 380" fill="none" stroke="#1a1005" stroke-width="4.5" stroke-linecap="round" transform="rotate(-30 390 368)"/>

  <!-- Bean 2 -->
  <ellipse cx="420" cy="415" rx="28" ry="18" fill="#6b3a1f" stroke="#1a1005" stroke-width="7" transform="rotate(20 420 415)"/>
  <path d="M 404 406 Q 420 419 436 422" fill="none" stroke="#1a1005" stroke-width="4.5" stroke-linecap="round" transform="rotate(20 420 415)"/>

</svg>

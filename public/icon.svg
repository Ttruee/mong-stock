<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon background -->
  <rect width="512" height="512" rx="96" fill="#111318"/>

  <!-- Cup body fill -->
  <path d="M 172 150 L 194 428 Q 198 450 256 450 Q 314 450 318 428 L 340 150 Z" fill="#1e2330"/>

  <!-- Dark coffee liquid -->
  <path d="M 206 292 L 316 278 L 318 428 Q 314 447 256 447 Q 198 447 194 428 L 198 292 Z" fill="#2c1a0a"/>

  <!-- Ice cube 1 (back left) -->
  <rect x="202" y="298" width="60" height="54" rx="10" fill="rgba(190,220,255,0.52)" stroke="rgba(255,255,255,0.65)" stroke-width="2.5"/>
  <rect x="209" y="305" width="18" height="10" rx="3" fill="rgba(255,255,255,0.38)"/>

  <!-- Ice cube 2 (back right) -->
  <rect x="252" y="308" width="62" height="56" rx="10" fill="rgba(170,210,255,0.48)" stroke="rgba(255,255,255,0.60)" stroke-width="2.5"/>
  <rect x="260" y="315" width="18" height="10" rx="3" fill="rgba(255,255,255,0.33)"/>

  <!-- Ice cube 3 (front center) -->
  <rect x="212" y="360" width="58" height="52" rx="10" fill="rgba(200,228,255,0.58)" stroke="rgba(255,255,255,0.68)" stroke-width="2.5"/>
  <rect x="219" y="367" width="16" height="9" rx="3" fill="rgba(255,255,255,0.40)"/>

  <!-- Cup outline -->
  <path d="M 172 150 L 194 428 Q 198 452 256 452 Q 314 452 318 428 L 340 150 Z" fill="none" stroke="#4ade80" stroke-width="10" stroke-linejoin="round"/>

  <!-- Top rim ellipse -->
  <ellipse cx="256" cy="150" rx="84" ry="18" fill="#1e2330"/>
  <ellipse cx="256" cy="150" rx="84" ry="18" fill="none" stroke="#4ade80" stroke-width="10"/>

  <!-- Straw -->
  <rect x="300" y="64" width="20" height="236" rx="10" fill="#4ade80"/>
  <rect x="305" y="64" width="6" height="236" rx="3" fill="rgba(255,255,255,0.32)"/>

  <!-- Condensation drops -->
  <circle cx="234" cy="344" r="3.2" fill="rgba(255,255,255,0.14)"/>
  <circle cx="226" cy="376" r="2.6" fill="rgba(255,255,255,0.11)"/>
  <circle cx="292" cy="385" r="3.0" fill="rgba(255,255,255,0.11)"/>
  <circle cx="305" cy="352" r="2.2" fill="rgba(255,255,255,0.10)"/>
</svg>

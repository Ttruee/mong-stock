<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>

  <!-- Background -->
  <radialGradient id="bg" cx="38%" cy="32%" r="70%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="512" y2="512">
    <stop offset="0%" stop-color="#FFF6E4"/>
    <stop offset="100%" stop-color="#F2D9A0"/>
  </radialGradient>

  <!-- Cup body: warm golden-cream top-left → deeper brown bottom-right -->
  <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#F2DCA8"/>
    <stop offset="45%"  stop-color="#CBА570"/>
    <stop offset="100%" stop-color="#9A7038"/>
  </linearGradient>

  <!-- Cup right-side darkening -->
  <linearGradient id="cupSide" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(60,25,5,0.22)"/>
  </linearGradient>

  <!-- Lid -->
  <linearGradient id="lidGrad" x1="5%" y1="0%" x2="95%" y2="100%">
    <stop offset="0%"   stop-color="#A86C3C"/>
    <stop offset="100%" stop-color="#58301A"/>
  </linearGradient>

  <!-- Lid cap -->
  <linearGradient id="capGrad" x1="5%" y1="0%" x2="95%" y2="100%">
    <stop offset="0%"   stop-color="#7A4A24"/>
    <stop offset="100%" stop-color="#44200A"/>
  </linearGradient>

  <!-- Sleeve -->
  <linearGradient id="sleeveGrad" x1="5%" y1="0%" x2="95%" y2="100%">
    <stop offset="0%"   stop-color="#7C4C26"/>
    <stop offset="100%" stop-color="#3C1C06"/>
  </linearGradient>

  <!-- Glossy highlight (specular) -->
  <radialGradient id="gloss" cx="28%" cy="22%" r="52%">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.82)"/>
    <stop offset="55%"  stop-color="rgba(255,255,255,0.18)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </radialGradient>

  <!-- Straw -->
  <linearGradient id="strawGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#D08A10"/>
    <stop offset="32%"  stop-color="#F8BC30"/>
    <stop offset="65%"  stop-color="#E8A418"/>
    <stop offset="100%" stop-color="#B87010"/>
  </linearGradient>

  <!-- Drop shadow -->
  <filter id="shadow" x="-20%" y="-8%" width="145%" height="140%">
    <feDropShadow dx="3" dy="16" stdDeviation="18" flood-color="#7A4418" flood-opacity="0.34"/>
  </filter>

  <!-- Clip paths -->
  <clipPath id="cupClip">
    <path d="M160 200 L352 200 L324 434 L188 434 Z"/>
  </clipPath>
  <clipPath id="lidClip">
    <path d="M144 158 L368 158 L356 202 L156 202 Z"/>
  </clipPath>
  <clipPath id="capClip">
    <rect x="188" y="130" width="136" height="34" rx="17"/>
  </clipPath>

</defs>

<!-- ── BACKGROUND ── -->
<rect width="512" height="512" rx="114" fill="url(#bg)"/>

<!-- ── GROUND SHADOW ── -->
<ellipse cx="256" cy="458" rx="112" ry="14" fill="rgba(100,52,12,0.20)"/>

<!-- ── CUP + LID GROUP (drop shadow) ── -->
<g filter="url(#shadow)">

  <!-- CUP BODY -->
  <path d="M160 200 L352 200 L324 434 L188 434 Z" fill="url(#cupGrad)"/>
  <!-- Right-side gradient shadow (3D depth) -->
  <path d="M160 200 L352 200 L324 434 L188 434 Z" fill="url(#cupSide)"/>

  <!-- SLEEVE / BAND -->
  <path d="M164 274 L348 274 L336 326 L176 326 Z" fill="url(#sleeveGrad)"/>
  <!-- Sleeve top highlight -->
  <path d="M164 274 L348 274 L344 286 L166 286 Z" fill="rgba(255,255,255,0.11)"/>
  <!-- Sleeve bottom shadow -->
  <path d="M176 314 L336 314 L336 326 L176 326 Z" fill="rgba(0,0,0,0.13)"/>

  <!-- CUP SPECULAR (glossy blob, upper-left) -->
  <ellipse cx="207" cy="254" rx="40" ry="62"
           fill="url(#gloss)" clip-path="url(#cupClip)"
           transform="rotate(-10 207 254)"/>

  <!-- Cup bottom shadow edge -->
  <ellipse cx="256" cy="434" rx="68" ry="9" fill="rgba(80,40,8,0.28)"/>

  <!-- LID -->
  <path d="M144 158 L368 158 L356 202 L156 202 Z" fill="url(#lidGrad)"/>
  <!-- Lid specular highlight -->
  <ellipse cx="222" cy="170" rx="64" ry="11"
           fill="rgba(255,255,255,0.24)" clip-path="url(#lidClip)"/>
  <!-- Lid right shadow -->
  <path d="M296 158 L368 158 L356 202 L286 202 Z"
        fill="rgba(0,0,0,0.11)" clip-path="url(#lidClip)"/>

  <!-- LID CAP -->
  <rect x="188" y="130" width="136" height="34" rx="17" fill="url(#capGrad)"/>
  <!-- Cap highlight -->
  <rect x="196" y="134" width="54" height="13" rx="6.5"
        fill="rgba(255,255,255,0.22)" clip-path="url(#capClip)"/>
  <!-- Cap bottom shadow -->
  <rect x="188" y="152" width="136" height="12" rx="6"
        fill="rgba(0,0,0,0.14)" clip-path="url(#capClip)"/>

</g>

<!-- ── STRAW ── -->
<g filter="url(#shadow)">
  <rect x="290" y="42" width="26" height="126" rx="13" fill="url(#strawGrad)"/>
  <!-- Straw inner highlight -->
  <rect x="295" y="45" width="9" height="120" rx="4.5" fill="rgba(255,255,255,0.36)"/>
  <!-- Straw top specular -->
  <ellipse cx="303" cy="45" rx="11" ry="5" fill="rgba(255,255,255,0.55)"/>
</g>

<!-- ── STEAM WISPS ── -->
<path d="M196 146 Q191 128 198 110 Q205 92 199 74"
      stroke="rgba(190,140,70,0.45)" stroke-width="7" fill="none"
      stroke-linecap="round"/>
<path d="M222 140 Q218 122 224 104 Q230 86 225 68"
      stroke="rgba(190,140,70,0.32)" stroke-width="6" fill="none"
      stroke-linecap="round"/>

<!-- ── COFFEE BEANS (decorative) ── -->
<!-- Bean 1 -->
<ellipse cx="346" cy="394" rx="19" ry="12"
         fill="#5A2E0E" stroke="#38190A" stroke-width="3.5"
         transform="rotate(-28 346 394)"/>
<path d="M333 388 Q346 396 359 390"
      stroke="#38190A" stroke-width="3" fill="none"
      stroke-linecap="round" transform="rotate(-28 346 394)"/>

<!-- Bean 2 -->
<ellipse cx="372" cy="424" rx="17" ry="11"
         fill="#5A2E0E" stroke="#38190A" stroke-width="3.5"
         transform="rotate(18 372 424)"/>
<path d="M360 419 Q372 427 384 421"
      stroke="#38190A" stroke-width="3" fill="none"
      stroke-linecap="round" transform="rotate(18 372 424)"/>

<!-- ── SMALL SPARKLES (cute touch) ── -->
<g fill="#E8A020" opacity="0.75">
  <circle cx="118" cy="145" r="6"/>
  <circle cx="108" cy="160" r="3.5"/>
  <circle cx="132" cy="162" r="3.5"/>
  <circle cx="120" cy="130" r="3"/>
</g>
<g fill="#D4B860" opacity="0.55">
  <circle cx="400" cy="130" r="5"/>
  <circle cx="391" cy="143" r="3"/>
  <circle cx="411" cy="143" r="3"/>
</g>

</svg>

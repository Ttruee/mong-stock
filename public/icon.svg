<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#111318"/>

  <!-- Straw (behind cup rim) -->
  <rect x="305" y="55" width="24" height="210" rx="12" fill="#4ade80"/>
  <rect x="311" y="55" width="8" height="210" rx="4" fill="rgba(255,255,255,0.35)"/>
  <!-- Straw bent tip -->
  <rect x="305" y="55" width="40" height="24" rx="12" fill="#4ade80"/>

  <!-- Cup body (chubby & round) -->
  <path d="M 158 172 L 182 430 Q 188 462 256 462 Q 324 462 330 430 L 354 172 Z" fill="#1c1008"/>

  <!-- Ice cubes peeking at top -->
  <rect x="178" y="178" width="72" height="66" rx="14" fill="rgba(210,238,255,0.72)" stroke="rgba(255,255,255,0.85)" stroke-width="3"/>
  <rect x="187" y="187" width="24" height="14" rx="5" fill="rgba(255,255,255,0.55)"/>

  <rect x="242" y="182" width="76" height="68" rx="14" fill="rgba(195,228,255,0.66)" stroke="rgba(255,255,255,0.80)" stroke-width="3"/>
  <rect x="252" y="192" width="26" height="14" rx="5" fill="rgba(255,255,255,0.48)"/>

  <rect x="183" y="236" width="64" height="58" rx="12" fill="rgba(220,242,255,0.68)" stroke="rgba(255,255,255,0.78)" stroke-width="3"/>

  <!-- Cup outline -->
  <path d="M 158 172 L 182 430 Q 188 464 256 464 Q 324 464 330 430 L 354 172 Z"
        fill="none" stroke="#4ade80" stroke-width="11" stroke-linejoin="round"/>

  <!-- Top rim -->
  <ellipse cx="256" cy="172" rx="98" ry="21" fill="#1c1008"/>
  <ellipse cx="256" cy="172" rx="98" ry="21" fill="none" stroke="#4ade80" stroke-width="11"/>

  <!-- ── KAWAII FACE ── -->

  <!-- Left eye white -->
  <ellipse cx="210" cy="340" rx="28" ry="30" fill="white"/>
  <!-- Left pupil -->
  <ellipse cx="210" cy="343" rx="17" ry="19" fill="#1a0e06"/>
  <!-- Left eye shine -->
  <circle cx="219" cy="334" r="7" fill="white"/>
  <circle cx="207" cy="348" r="3.5" fill="rgba(255,255,255,0.5)"/>

  <!-- Right eye white -->
  <ellipse cx="302" cy="340" rx="28" ry="30" fill="white"/>
  <!-- Right pupil -->
  <ellipse cx="302" cy="343" rx="17" ry="19" fill="#1a0e06"/>
  <!-- Right eye shine -->
  <circle cx="311" cy="334" r="7" fill="white"/>
  <circle cx="299" cy="348" r="3.5" fill="rgba(255,255,255,0.5)"/>

  <!-- Blush (rosy cheeks) -->
  <ellipse cx="182" cy="368" rx="22" ry="13" fill="rgba(255,140,160,0.42)"/>
  <ellipse cx="330" cy="368" rx="22" ry="13" fill="rgba(255,140,160,0.42)"/>

  <!-- Smile -->
  <path d="M 224 388 Q 256 414 288 388" fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round"/>

  <!-- Tiny sparkles around cup -->
  <circle cx="130" cy="230" r="5" fill="#4ade80" opacity="0.7"/>
  <circle cx="118" cy="252" r="3" fill="#4ade80" opacity="0.5"/>
  <circle cx="142" cy="258" r="3" fill="#4ade80" opacity="0.4"/>

  <circle cx="382" cy="220" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="394" cy="245" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="370" cy="248" r="3" fill="#a78bfa" opacity="0.4"/>

</svg>

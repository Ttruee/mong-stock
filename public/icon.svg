<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <clipPath id="lidClip">
      <rect x="90" y="126" width="334" height="62" rx="22"/>
    </clipPath>
    <clipPath id="cupClip">
      <path d="M116 176 L396 176 L364 452 L148 452 Z"/>
    </clipPath>
    <clipPath id="beanClip">
      <circle cx="170" cy="388" r="87"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- STRAW -->
  <rect x="245" y="8" width="22" height="136" rx="11" fill="#111111"/>

  <!-- CUP BODY -->
  <path d="M116 176 L396 176 L364 452 L148 452 Z"
        fill="#ffffff" stroke="#111111" stroke-width="22" stroke-linejoin="round"/>
  <!-- Cup right gray highlight -->
  <path d="M332 176 L364 452 L326 452 L296 176 Z" fill="#d0d0d0" clip-path="url(#cupClip)"/>
  <!-- Cup top band -->
  <line x1="116" y1="218" x2="396" y2="218" stroke="#111111" stroke-width="20"/>
  <!-- Cup bottom band -->
  <line x1="148" y1="414" x2="364" y2="414" stroke="#111111" stroke-width="20"/>

  <!-- LID -->
  <rect x="90" y="126" width="334" height="62" rx="22"
        fill="#ffffff" stroke="#111111" stroke-width="22" stroke-linejoin="round"/>
  <!-- Lid right gray highlight -->
  <rect x="352" y="128" width="68" height="58" rx="14" fill="#d0d0d0" clip-path="url(#lidClip)"/>
  <!-- Lid divider line -->
  <line x1="90" y1="156" x2="424" y2="156" stroke="#111111" stroke-width="18"/>

  <!-- COFFEE BEAN -->
  <circle cx="170" cy="388" r="88" fill="#ffffff" stroke="#111111" stroke-width="22"/>
  <!-- Bean right gray highlight -->
  <path d="M220 308 Q266 388 220 468"
        stroke="#d0d0d0" stroke-width="54" fill="none" stroke-linecap="round"
        clip-path="url(#beanClip)"/>
  <!-- Bean top lobe -->
  <path d="M103 358 Q136 316 170 348 Q204 380 238 348"
        stroke="#111111" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Bean center crease -->
  <line x1="103" y1="388" x2="237" y2="388"
        stroke="#111111" stroke-width="16" stroke-linecap="round"/>
  <!-- Bean bottom lobe -->
  <path d="M103 418 Q136 460 170 428 Q204 396 238 428"
        stroke="#111111" stroke-width="16" fill="none" stroke-linecap="round"/>
</svg>
